name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Create embed stub
        run: mkdir -p internal/caddy/web && touch internal/caddy/web/index.html
      - name: Run tests
        run: go test ./...

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Build dashboard
        run: cd dashboard && npm ci && npm run build
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Copy dashboard to embed path
        run: rm -rf internal/caddy/web && cp -r dashboard/out internal/caddy/web
      - name: Build binary (linux/amd64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o domudns ./cmd/domudns
      - uses: actions/upload-artifact@v4
        with:
          name: domudns-linux-amd64
          path: domudns

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t domudns:latest .
