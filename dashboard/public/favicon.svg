<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
  </defs>
  <!-- Hintergrund (abgerundetes Rechteck) -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Äußerer Kreis -->
  <circle cx="16" cy="16" r="10.5" stroke="white" stroke-width="1.5" fill="none"/>
  <!-- Vertikale Ellipse (Mittelmeridian) -->
  <ellipse cx="16" cy="16" rx="4.5" ry="10.5" stroke="white" stroke-width="1.5" fill="none"/>
  <!-- Äquator -->
  <line x1="5.5" y1="16" x2="26.5" y2="16" stroke="white" stroke-width="1.5"/>
  <!-- Oberer Breitenkreis -->
  <path d="M 6.8 11.5 Q 16 10 25.2 11.5" stroke="white" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- Unterer Breitenkreis -->
  <path d="M 6.8 20.5 Q 16 22 25.2 20.5" stroke="white" stroke-width="1" fill="none" stroke-linecap="round"/>
</svg>
